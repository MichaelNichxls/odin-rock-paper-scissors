<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
</head>
<body>
  <h1 id="title">Rock Paper Scissors</h1>
  <div id="choices">
    <button id="rock">Rock<br>🗿</button>
    <button id="paper">Paper<br>📝</button>
    <button id="scissors">Scissors<br>✂️</button>
  </div>
  <div id="result">Wild charizard appeared!</div>
  <div id="reset">
    <button>Play again?</button>
  </div>
  <div id="scores">
    <img src="assets/images/red.png" alt="player" width="52" height="52">
    <span id="player-score">0</span> - <span id="cpu-score">0</span>
    <img src="assets/images/charizard.png" alt="cpu" width="52" height="52">
  </div>
</body>
</html>
